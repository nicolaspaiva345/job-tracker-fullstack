<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker | Seu Gerenciador de Vagas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-indigo-500 tracking-tight">💼 Job Tracker</h1>
            <p class="text-gray-400 mt-2">Gerencie suas candidaturas e conquiste sua vaga em 2026</p>
        </header>

        <section class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700 mb-8">
            <h2 class="text-xl font-bold mb-4 text-indigo-400">Cadastrar Nova Oportunidade</h2>
            <form id="form-vaga" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Empresa</label>
                    <input type="text" id="empresa" required class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Cargo</label>
                    <input type="text" id="cargo" required class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-400 mb-1">Link da Vaga</label>
                    <input type="url" id="linkVaga" required class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500" placeholder="https://linkedin.com/...">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Status Inicial</label>
                    <select id="status" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
                        <option value="INSCRITO">Inscrito</option>
                        <option value="ENTREVISTA">Entrevista</option>
                        <option value="RECUSADO">Recusado</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Anotações</label>
                    <input type="text" id="anotacoes" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500" placeholder="Ex: Falar com Recrutador">
                </div>
                <div class="md:col-span-2 mt-2">
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200">
                        Adicionar Vaga
                    </button>
                </div>
            </form>
        </section>

        <section>
            <h2 class="text-2xl font-bold mb-4 text-gray-200">Suas Candidaturas</h2>
            <div id="lista-vagas" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
